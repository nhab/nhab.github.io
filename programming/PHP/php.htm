<h2>phpMysql</h2>

<b>Open a Connection to MySQL </b>
<br/>
<script>
Block("MySQLi Object-Oriented",
null,
`$servername = "localhost";
    $username = "username";
    $password = "password";

    // Create connection
    $conn = new mysqli($servername, 
             $username, $password);

    // Check connection
    if ($conn->connect_error) {
        die("Connection failed: "
         . $conn->connect_error);
    }
    echo "Connected successfully";`,"php" );
Block("MySQLi Procedural",null,
`$servername = "localhost";
$username = "username";
$password = "password";

// Create connection
$conn = mysqli_connect($servername, 
             $username, $password);

// Check connection
if (!$conn) {
    die("Connection failed: " .
         mysqli_connect_error());
}
echo "Connected successfully";`,"php");
Block("PDO",null,
`$servername = "localhost";
$username = "username";
$password = "password";
$dbname = "myDBPDO";
try {$conn = new PDO("mysql:host=$servername;dbname=$dbname", 
    $username, $password);
    // set the PDO error mode to exception
    $conn->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
    $sql = "INSERT INTO Guest (fname,lname)VALUES ('John', 'Doe')";
    // use exec() because no results are returned
    $conn->exec($sql);
    echo "New record created successfully";
        $last_id = $conn->lastInsertId();
    echo "New record created successfully.
    Last inserted ID is: " . $last_id;
}catch(PDOException $e) {
    echo $sql . "< br>" . $e->getMessage();
 }
$conn = null;`,"php");
</script>

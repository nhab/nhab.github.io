 <script>
stitle="React";
sBody=`React is a library for building composable user interfaces.
It encourages the creation of reusable UI components.
Lots of people use React as the V in MVC. 
React can also render on the server using Node, and native apps using React Native
`;

Block(stitle,sBody,null,"javascript");
 </script>
       
<h2>Environment Setup</h2>
<script>
 Block("1-Install Node.js");
 Block("2-Create the Root Folder",
       "",`C:\\>mkdir reactApp
C:\\Users\\reactApp>npm init`,"html");
    
Block("3-Install Global Packages","Installing babel plugins",
 `C:\\reactApp>npm install -g babel
 C:\\reactApp>npm install -g babel-cli`,"html","25%");
    
Block("4 - Add Dependencies and Plugins","",
`C:\\reactApp>npm install webpack --save
 C:\\reactApp>npm install webpack-dev-server --save`,"php","25%");
    
Block("5- add these packages to package.json"
   ,"The --save command will add these packages to package.json file."
   ,`C:..\\reactApp>npm install react --save
  C:\\..\\reactApp>npm install react-dom --save`);
    
 Block("6-Create the Files","using command prompt:",
 `C:\reactApp>touch index.html
C:\reactApp>touch App.jsx
C:\reactApp>touch main.js
C:\reactApp>touch webpack.config.js`,"html");

 Block("7-Set Compiler, Server and Loaders","Edit webpack.config.js .<br> We are setting webpack entry point to be main.js",
  `var config = {
   entry: './main.js',
   output: {      path:'/',      filename: 'index.js',   },
   devServer: {   inline: true,      port: 8080   },
   module: {      loaders: [         {
            test: /\.jsx?$/,
            exclude: /node_modules/,
            loader: 'babel-loader',
            query: {
               presets: ['es2015', 'react']     }     }
      ]   }}
module.exports = config;`,"html");
    
  Block("8-Install webpack-dev-server",""
        ,`C:\reactApp>npm install webpack-dev-server -g`,","javascript");
  Block("9-Edit package.json",
        `Open the package.json and delete test echo Error: 
        no test specified & & exit 1 inside scripts object.and add the start command instead.`
        ,`"start": "webpack-dev-server --hot"`,","javascript");
    
 Block("10- index.html","We are setting div id = 'app' as a root element for our app ",
`&lt!DOCTYPE html>
&lthtml lang = "en">
   &lthead>
      &ltmeta charset = "UTF-8">
      &lttitle>React App&lt/title>
   &lt/head>
   &ltbody>
      &ltdiv id = "app">&lt/div>
      &ltscript src = "index.js">&lt/script>
   &lt/body>
&lt/html>`,"html");

Block("11- App.jsx and main.js","App.jsx",
`import React from 'react';

class App extends React.Component {
   render() {
      return (
         <div>
            Hello World!!!
         </div>
      );
   }
}
export default App;`,","javascript");
Block("12- main.js","",
`import React from 'react';
import ReactDOM from 'react-dom';
import App from './App.jsx';

ReactDOM.render(<App />, document.getElementById('app'));`,"php");

Block("Running the Server","run the following command line and see the result on http://localhost:8080/",
"C:\\reactApp>npm start",","javascript");
</script>

<h2>JSX</h2>
  React uses JSX for templating instead of regular JavaScript
<script>
  Block("Using JSX","App.jsx", `import React from 'react';
class App extends React.Component {
   render() {
      return (
         <div>
            Hello World!!!
         </div>
      );
   }
}
export default App;`,","javascript");

Block("Nested Elements","App.jsx",
 `import React from 'react';

class App extends React.Component {
   render() {
      return (
         <div>
            <h1>Header</h1>
            <h2>Content</h2>
            <p>This is the content!!!</p>
         </div>
      );
   }
}
export default App;
`,"javascript");
    
Block("Attributes",
      `We can use our own custom attributes in addition to regular HTML properties and attributes.
When we want to add custom attribute, we need to use data- prefix.
In the following example, we added data-myattribute as an attribute of p element.`,
      `import React from 'react';

class App extends React.Component {
   render() {
      return (
         <div>
            <h1>Header</h1>
            <h2>Content</h2>
            <p data-myattribute = "somevalue">This is the content!!!</p>
         </div>
      );
   }
}
export default App;`,"javascript");

<h2>JSX</h2>
  React uses JSX for templating instead of regular JavaScript
  <br>
<script>
  Block("Using JSX","App.jsx", `import React from 'react';
class App extends React.Component {
   render() {
      return (
         &ltdiv>
            Hello World!!!
         &lt/div>
      );
   }
}
export default App;`,"javascript","30%","410px");

Block("Nested Elements","App.jsx",
 `import React from 'react';

class App extends React.Component {
   render() {
      return (
         &ltdiv>
            &lth1>Header&lt/h1>
            &lth2>Content&lt/h2>
            &ltp>This is the content!!!&lt/p>
         &lt/div>
      );
   }
}
export default App;
`,"javascript","26%","470px");
    
Block("Attributes",
      `We can use our own custom attributes in addition to regular HTML properties and attributes.
When we want to add custom attribute, we need to use data- prefix.
In the following example, we added data-myattribute as an attribute of p element.`,
      `import React from 'react';

class App extends React.Component {
   render() {
      return (
         &ltdiv>
            &lth1>Header&lt/h1>
            &lth2>Content&lt/h2>
            &ltp data-myattribute = "somevalue">
            This is the content!!!&lt/p>
         &lt/div>
      );
   }
}
export default App;`,"javascript","30%","600px");
  
 Block("JavaScript Expressions",`JavaScript expressions can be used inside of JSX.
We just need to wrap it with curly brackets {} :`,
`import React from 'react';

class App extends React.Component {
   render() {
      return (
         &ltdiv>
            &lth1>{1+1}&lt/h1>
         &lt/div>
      );
   }
}
export default App;`,"javascript","25%","480px");

Block("conditional (ternary) expressions",""
,`import React from 'react';
class App extends React.Component {
   render() {
      var i = 1;
      return (
         &ltdiv>
            &lth1>{i == 1 ? 'True!'
             : 'False'}&lt/h1>
         &lt/div>
      );
   }
}
export default App;`,"javascript","30%","410px");
    
Block("Styling",`React recommends using inline styles. 
When we want to set inline styles, we need to use camelCase syntax.
React will also automatically append px after the number value on specific elements. 
The following example shows how to add myStyle inline to h1 element.`,
`import React from 'react';
class App extends React.Component {
   render() {
      var myStyle = { fontSize: 100,
         color: '#FF0000'  }
      return (
         &ltdiv>
            &lth1 style = {myStyle}>Header&lt/h1>
         &lt/div>
      );
   }
}
export default App;`,"javascript","40%","550px");
 
Block("Naming Convention",
`HTML tags always use lowercase tag names, <br>while React components start with Uppercase.<br>
<b>Note</b> − You should use className and htmlFor as XML attribute names instead of class and for.
This is explained on React official page as −
Since JSX is JavaScript, identifiers such as class and for are discouraged as XML attribute names.
Instead, React DOM components expect DOM property names such as className and htmlFor, respectively.`
,null,null,"70%","200px"       );

<br><h7>Stateful Example</h7><br>
<script>
      Block("App.jsx","",
`import React from 'react';
class App extends React.Component {
   constructor() {
      super();
      this.state = {
         data:    [{ "id":1,"name":"Foo","age":"20" },
                   { "id":2,"name":"Bar","age":"30" },
                   { "id":3,"name":"Baz","age":"40"}
                  ]  }
   }
   render() { return (
         &ltdiv> &ltHeader/>
            &lttable> &lttbody>
                  {this.state.data.map((person, i) => &ltTableRow key = {i} 
                     data = {person} />)}
             &lt/tbody>&lt/table>
         &lt/div>
      );   }
}
class Header extends React.Component {
   render() {return ( &ltdiv>&lth1>Header&lt/h1>&lt/div> ); }
}
class TableRow extends React.Component {
   render() {return (&lttr>
            &lttd>{this.props.data.id}&lt/td>
            &lttd>{this.props.data.name}&lt/td>
            &lttd>{this.props.data.age}&lt/td>
         &lt/tr>  );   }
}
export default App;`,"php","45%","850px");
